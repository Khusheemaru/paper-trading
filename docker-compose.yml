services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hedgebot-db
    environment:
      POSTGRES_DB: algo_trading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Khushee@4647
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hedgebot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build: .
    container_name: hedgebot-backend
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_NAME: algo_trading
      DB_USER: postgres
      DB_PASS: Khushee@4647
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  # Data Streamer
  streamer:
    build: .
    container_name: hedgebot-streamer
    command: python stream_india.py
    environment:
      DB_HOST: postgres
      DB_NAME: algo_trading
      DB_USER: postgres
      DB_PASS: Khushee@4647
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USE_MOCK_DATA: "TRUE"
      TICK_INTERVAL: "0.1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
